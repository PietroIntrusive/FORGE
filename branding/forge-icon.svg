<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- FORGE app icon — "obsidian & magma"
       Bigorna de obsidiana com veias de magma vivas sobre squircle escuro.
       Master 1024; exportado para .ico multi-size. -->
  <defs>
    <clipPath id="sq"><rect x="0" y="0" width="1024" height="1024" rx="232"/></clipPath>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1d23"/>
      <stop offset=".5" stop-color="#111114"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>

    <!-- brasa no leito: esquenta a base do ícone -->
    <radialGradient id="emberBed" cx=".5" cy=".98" r=".85">
      <stop offset="0" stop-color="#f97316" stop-opacity=".62"/>
      <stop offset=".32" stop-color="#c2410c" stop-opacity=".34"/>
      <stop offset=".7" stop-color="#b8442e" stop-opacity=".1"/>
      <stop offset="1" stop-color="#b8442e" stop-opacity="0"/>
    </radialGradient>

    <!-- corpo da bigorna: obsidiana -->
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4b4b58"/>
      <stop offset=".26" stop-color="#30303a"/>
      <stop offset="1" stop-color="#191920"/>
    </linearGradient>
    <!-- luz fria no alto (frio→quente, a tese do produto) -->
    <radialGradient id="coldTop" cx=".22" cy=".05" r=".7">
      <stop offset="0" stop-color="#3b4a6b" stop-opacity=".34"/>
      <stop offset=".5" stop-color="#3b4a6b" stop-opacity=".08"/>
      <stop offset="1" stop-color="#3b4a6b" stop-opacity="0"/>
    </radialGradient>

    <!-- veia de magma: brasa → forja → incandescente -->
    <linearGradient id="magma" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8442e"/>
      <stop offset=".42" stop-color="#f97316"/>
      <stop offset=".78" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#fff3c4"/>
    </linearGradient>

    <!-- clarão atrás da cintura da bigorna -->
    <radialGradient id="coreGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fcd34d" stop-opacity=".85"/>
      <stop offset=".42" stop-color="#f97316" stop-opacity=".4"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vig" cx=".5" cy=".4" r=".8">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset=".72" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".42"/>
    </radialGradient>

    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <g clip-path="url(#sq)">
    <!-- fundo -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#coldTop)"/>
    <rect width="1024" height="1024" fill="url(#emberBed)"/>

    <!-- clarão de forja atrás da cintura -->
    <ellipse cx="590" cy="565" rx="330" ry="190" fill="url(#coreGlow)"/>

    <!-- reflexo quente no chão sob a bigorna -->
    <ellipse cx="605" cy="792" rx="330" ry="52" fill="#f97316" opacity=".38" filter="url(#soft)"/>

    <!-- ===== BIGORNA (silhueta obsidiana) ===== -->
    <!-- bloco da face + chifre: topo contínuo, barriga côncava sobe até a ponta -->
    <path d="M158 396 Q 246 352 332 344 L830 344 L846 362 L846 466 L830 484 L332 484 Q 250 434 158 396 Z" fill="url(#steel)"/>
    <!-- cintura -->
    <path d="M494 484 L716 484 L666 624 L546 624 Z" fill="url(#steel)"/>
    <!-- sombra da face sobre a cintura (overhang) -->
    <path d="M494 484 L716 484 L705 516 L505 516 Z" fill="#0c0c0f" opacity=".55"/>
    <!-- degrau da base -->
    <path d="M464 624 L746 624 L794 706 L416 706 Z" fill="url(#steel)"/>
    <!-- pé -->
    <path d="M394 706 L816 706 L816 750 Q816 760 804 760 L406 760 Q394 760 394 750 Z" fill="url(#steel)"/>

    <!-- aresta superior polida -->
    <path d="M332 344 L830 344 L846 362 L348 362 Z" fill="#5a5a68"/>
    <path d="M158 396 Q 246 352 332 344 L332 362 Q 252 372 184 406 Z" fill="#4d4d5a"/>
    <!-- rim light de magma refletido na aresta superior -->
    <path d="M182 396 Q 252 354 332 348 L824 348" fill="none" stroke="url(#magma)" stroke-width="6" stroke-linecap="round" opacity=".75"/>
    <!-- rim light quente na quina direita e na base (reflexo da brasa) -->
    <path d="M846 368 L846 462" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round" opacity=".45"/>
    <path d="M418 704 L792 704" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity=".3"/>

    <!-- ===== VEIAS DE MAGMA ===== -->
    <!-- halo difuso por baixo (calor vazando) -->
    <g filter="url(#soft)" opacity=".8">
      <path d="M356 444 L458 424 L524 456 L612 424 L706 450 L788 432" fill="none" stroke="#f97316" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M604 484 L588 556 L616 624" fill="none" stroke="#f97316" stroke-width="20" stroke-linecap="round"/>
      <path d="M498 668 L566 652 L648 676 L718 658" fill="none" stroke="#f97316" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- veias nítidas -->
    <g filter="url(#bloom)">
      <path d="M356 444 L458 424 L524 456 L612 424 L706 450 L788 432" fill="none" stroke="url(#magma)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M604 484 L588 556 L616 624" fill="none" stroke="url(#magma)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M524 456 L508 484" fill="none" stroke="url(#magma)" stroke-width="9" stroke-linecap="round"/>
      <path d="M498 668 L566 652 L648 676 L718 658" fill="none" stroke="url(#magma)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M236 420 L300 430" fill="none" stroke="url(#magma)" stroke-width="8" stroke-linecap="round"/>
      <!-- nós incandescentes -->
      <circle cx="524" cy="456" r="8" fill="#fff3c4"/>
      <circle cx="612" cy="424" r="7" fill="#fff3c4"/>
      <circle cx="616" cy="624" r="7" fill="#ffe9a8"/>
    </g>

    <!-- fagulhas (contidas) -->
    <g filter="url(#bloom)">
      <path d="M772 280 l9 14 -9 14 -9 -14 Z" fill="#fcd34d" opacity=".95"/>
      <path d="M330 296 l6 10 -6 10 -6 -10 Z" fill="#f97316" opacity=".85"/>
    </g>

    <!-- vinheta -->
    <rect width="1024" height="1024" fill="url(#vig)"/>
  </g>

  <!-- borda sutil do squircle -->
  <rect x="4" y="4" width="1016" height="1016" rx="228" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="8"/>
</svg>
